<!DOCTYPE html>
<html>
<head>
    <title>Celebrity Classifier</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #3a3a5f);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            backdrop-filter: blur(15px);
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h2 {
            margin-bottom: 20px;
        }

        #dropArea {
            border: 2px dashed #aaa;
            padding: 30px;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        #dropArea:hover {
            border-color: #00ffcc;
            background: rgba(255,255,255,0.1);
        }

        img {
            margin-top: 20px;
            max-width: 200px;
            border-radius: 10px;
        }

        #prediction {
            margin-top: 15px;
            font-size: 20px;
            font-weight: bold;
        }

        #confidenceBar {
            width: 100%;
            height: 15px;
            background: #333;
            border-radius: 10px;
            margin-top: 10px;
            overflow: hidden;
        }

        #confidenceFill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00ffcc, #00ccff);
            transition: width 0.6s ease-in-out;
        }

        .loader {
            display: none;
            margin-top: 10px;
        }

        .loader div {
            width: 10px;
            height: 10px;
            margin: 3px;
            background: white;
            border-radius: 50%;
            display: inline-block;
            animation: bounce 0.6s infinite alternate;
        }

        .loader div:nth-child(2) { animation-delay: 0.2s; }
        .loader div:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            to { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🔥 Celebrity Classifier</h2>

    <div id="dropArea">
        Drag & Drop Image<br>or Click to Upload
        <input type="file" id="imageInput" hidden>
    </div>

    <img id="preview"/>

    <div class="loader" id="loader">
        <div></div><div></div><div></div>
    </div>

    <div id="prediction"></div>

    <div id="confidenceBar">
        <div id="confidenceFill"></div>
    </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
